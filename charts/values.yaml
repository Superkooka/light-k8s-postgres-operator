operator:
  image:
    repository: ghcr.io/superkooka/light-k8s-postgres-operator
    tag: "early-dev"  # managed-by-gradle
    pullPolicy: IfNotPresent
    pullSecrets: []
  # healthPort: 8080
  # metricsPort: 8081
  # leaderElection: false
  namespace: default
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  serviceAccount:
    name: my-operator

postgres:
  enabled: false
  auth:
    enablePostgresUser: true
    postgresPassword: ""
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password