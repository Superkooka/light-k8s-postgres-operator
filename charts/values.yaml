operator:
  image:
    repository: my-operator
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  # healthPort: 8080
  # metricsPort: 8081
  # leaderElection: false
  namespace: default
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  serviceAccount:
    name: my-operator

postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  serviceName: postgres
  secretName: postgres-admin-credentials
  credentials:
    username: postgres
    password: changeme
    database: postgres
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  storage:
    type: emptyDir
    size: 1Gi