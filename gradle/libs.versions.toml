# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
kotlin = "2.3.20"
josdk = "5.3.3"
jib = "3.5.3"
ktlint-plugin = "14.2.0"
postgresql = "42.7.10"
kotlin-logging = "7.0.0"
slf4j = "2.0.17"
logback = "1.5.32"
fabric8-crd = "7.6.1"
awaitility = "4.3.0"
ktor = "3.4.1"

[libraries]
josdk-bom = { module = "io.javaoperatorsdk:operator-framework-bom", version.ref = "josdk" }
josdk-framework = { module = "io.javaoperatorsdk:operator-framework" }
josdk-junit5 = { module = "io.javaoperatorsdk:operator-framework-junit-5" }
fabric8-crd-generator-v2 = { module = "io.fabric8:crd-generator-api-v2", version.ref = "fabric8-crd" }
fabric8-crd-collector = { module = "io.fabric8:crd-generator-collector", version.ref = "fabric8-crd" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
kotlin-logging = { module = "io.github.oshai:kotlin-logging-jvm", version.ref = "kotlin-logging" }
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
kotlin-test-junit5 = { module = "org.jetbrains.kotlin:kotlin-test-junit5" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
awaitility-kotlin = { module = "org.awaitility:awaitility-kotlin", version.ref = "awaitility" }
ktor-server-core = { module = "io.ktor:ktor-server-core-jvm", version.ref = "ktor" }
ktor-server-netty = { module = "io.ktor:ktor-server-netty-jvm", version.ref = "ktor" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
jib = { id = "com.google.cloud.tools.jib", version.ref = "jib" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint-plugin" }
