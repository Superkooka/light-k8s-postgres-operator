name: Publish Helm Chart

on:
  push:
    tags:
      - 'chart/v*.*.*'

env:
  REGISTRY: ghcr.io
  CHART_DIR: charts

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#chart/v}
          OWNER="${{ github.repository_owner }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=chart/v$VERSION" >> $GITHUB_OUTPUT
          echo "oci_repo=oci://${{ env.REGISTRY }}/${OWNER,,}/charts" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 #v4.3.1

      - name: Log in to GitHub Container Registry (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Add Helm repositories
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build Helm dependencies
        run: helm dependency build ${{ env.CHART_DIR }}

      - name: Package Helm chart
        run: |
          helm package ${{ env.CHART_DIR }} \
            --version ${{ steps.meta.outputs.version }} \
            --app-version ${{ steps.meta.outputs.version }} \
            --destination /tmp/helm-pkg

      - name: Push chart to OCI registry
        run: |
          helm push /tmp/helm-pkg/*.tgz ${{ steps.meta.outputs.oci_repo }}

      - name: Generate all-in-one manifest
        run: |
          echo "# Generated by helm template — CRDs + all resources for namespace: operators" >> /tmp/all-in-one.yaml
          echo "---" >> /tmp/all-in-one.yaml
          helm template light-k8s-postgres-operator ${{ env.CHART_DIR }} \
            --include-crds \
            --namespace operators \
            --create-namespace \
            --set postgresql.enabled=false \
            > /tmp/all-in-one.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Chart ${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: |
            /tmp/helm-pkg/*.tgz
            /tmp/all-in-one.yaml
          body: |
            ## Installation

            ### Helm (recommended)
            ```bash
            helm install light-k8s-postgres-operator \
              oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/light-k8s-postgres-operator \
              --version ${{ steps.meta.outputs.version }} \
              --namespace operators --create-namespace
            ```

            ### Without Helm (all-in-one)
            ```bash
            kubectl apply -f all-in-one.yaml
            ```

            > **Note:** The all-in-one manifest targets the `operators` namespace
            > and has the bundled Bitnami PostgreSQL subchart disabled.
            > Edit `values.yaml` from the chart tarball for a custom setup.
      - name: Summary
        run: |
          echo "### ✅ Chart published" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- OCI: \`${{ steps.meta.outputs.oci_repo }}\`" >> $GITHUB_STEP_SUMMARY