name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/light-k8s-postgres-operator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=${IMAGE,,}" >> $GITHUB_OUTPUT   # lowercase

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with Jib
        run: |
          ./gradlew jib -PenableJib \
            -Djib.to.image=${{ steps.meta.outputs.image }} \
            -Djib.to.tags="${{ steps.meta.outputs.version }},latest"

      - name: Image digest
        run: |
          echo "Published: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"