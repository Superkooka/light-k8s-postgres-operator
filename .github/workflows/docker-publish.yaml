name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/light-k8s-postgres-operator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c #v5.0.2
        with:
          cache-read-only: false

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=${IMAGE,,}" >> $GITHUB_OUTPUT   # lowercase

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with Jib
        run: |
          ./gradlew jib -PenableJib \
            -Djib.to.image=${{ steps.meta.outputs.image }} \
            -Djib.to.tags="${{ steps.meta.outputs.version }},latest" \
            -Pversion=${{ steps.meta.outputs.version }}

      - name: Image digest
        run: |
          echo "Published: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"